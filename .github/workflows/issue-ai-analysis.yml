name: AI Issue Analysis
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: number
jobs:
  analyze:
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.action == 'created' &&
       contains(github.event.comment.body, '@github-actions') &&
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve issue number
        id: issue
        shell: bash
        run: |
          if [ -n "${{ github.event.issue.number }}" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create initial comment
        id: comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            🤖 **AI 正在分析该 Issue...**
            
            感谢您的反馈！AI 正在自动分析该问题，预计耗时约 10 分钟。

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests

      - name: Run AI analysis
        shell: bash
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          COMMENT_ID: ${{ steps.comment.outputs.comment-id }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: python .github/scripts/analyze_issue.py
